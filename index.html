<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>my-tool</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #1e293b;
    }

    header .logo {
      font-size: 1.25rem;
      font-weight: 700;
      color: #38bdf8;
    }

    nav a {
      color: #94a3b8;
      text-decoration: none;
      margin-left: 1.5rem;
      font-size: 0.95rem;
      transition: color 0.2s;
    }

    nav a:hover {
      color: #f1f5f9;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 2rem;
    }

    .badge {
      display: inline-block;
      background: #1e3a5f;
      color: #38bdf8;
      font-size: 0.8rem;
      padding: 0.3rem 0.9rem;
      border-radius: 999px;
      margin-bottom: 1.5rem;
      letter-spacing: 0.05em;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 1.25rem;
    }

    h1 span {
      color: #38bdf8;
    }

    p.subtitle {
      color: #94a3b8;
      font-size: 1.15rem;
      max-width: 520px;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .buttons {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 0.75rem 1.75rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .btn-primary {
      background: #38bdf8;
      color: #0f172a;
    }

    .btn-secondary {
      background: transparent;
      color: #f1f5f9;
      border: 1px solid #334155;
    }

    .features {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
      padding: 4rem 2rem;
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 2rem;
      flex: 1;
      min-width: 220px;
      max-width: 260px;
      text-align: left;
    }

    .card .icon {
      font-size: 1.75rem;
      margin-bottom: 1rem;
    }

    .card h3 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .card p {
      color: #94a3b8;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      color: #475569;
      font-size: 0.85rem;
      border-top: 1px solid #1e293b;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">my-tool</div>
    <nav>
      <a href="#">機能</a>
      <a href="#">ドキュメント</a>
      <a href="#">GitHub</a>
    </nav>
  </header>

  <main>
    <div class="badge">✦ 新登場</div>
    <h1>作業をもっと<br><span>シンプルに。</span></h1>
    <p class="subtitle">my-tool は、あなたの日常的なタスクを自動化・効率化するためのツールです。すぐに使えて、カスタマイズも自由。</p>
    <div class="buttons">
      <a href="#" class="btn btn-primary">無料で始める</a>
      <a href="#" class="btn btn-secondary">詳しく見る</a>
    </div>
  </main>

  <section class="features">
    <div class="card">
      <div class="icon">⚡</div>
      <h3>高速</h3>
      <p>無駄を省いた設計で、あらゆる操作をすばやく完了できます。</p>
    </div>
    <div class="card">
      <div class="icon">🔧</div>
      <h3>柔軟</h3>
      <p>設定ファイルひとつで動作を自由にカスタマイズできます。</p>
    </div>
    <div class="card">
      <div class="icon">🔒</div>
      <h3>安全</h3>
      <p>データはローカルで処理されるため、外部に送信されません。</p>
    </div>
  </section>

  <footer>
    &copy; 2026 my-tool. All rights reserved.
  </footer>

</body>
</html>
